name: Reusable Workflow

on:
  workflow_call:
    inputs:
      mm-type:
        required: true
        type: string
      mm-branch:
        required: false
        type: string
        default: 'master'
      mm-auths:
        required: false
        type: string
        default: '[""]'
      python-versions:
        required: false
        type: string
        default: '["3.12"]'
      rtppc-types:
        required: true
        type: string
      use-local-image:
        required: false
        type: boolean
        default: false
      rtpp-image:
        required: false
        type: string
        default: 'ghcr.io/sippy/rtpproxy'
      rtpp-image-tag:
        required: false
        type: string
        default: 'latest'
      artifact-files:
        required: false
        type: string
        default: ''
      buildkit-image:
        required: false
        type: string
        default: 'moby/buildkit:buildx-stable-1'
      buildkit-image-cache-key:
        required: false
        type: string
        default: ''
      buildkit-image-cache-path:
        required: false
        type: string
        default: ''
      buildkit-image-cache-tar:
        required: false
        type: string
        default: ''

jobs:
  build_ssut_image:
    name: Build SSUT Image
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.meta.outputs.image-ref }}
      image-artifact: ${{ steps.meta.outputs.image-artifact }}
    env:
      DOCKER_BUILD_SUMMARY: false
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - uses: actions/checkout@v6

      - name: Compute image metadata
        id: meta
        run: |
          MM_BRANCH_SAFE="$(echo '${{ inputs.mm-branch }}' | sed 's|[^a-zA-Z0-9_.-]|-|g')"
          SHA_SHORT="$(printf '%s' "$GITHUB_SHA" | cut -c1-12)"
          IMAGE_BASE="ghcr.io/${{ github.repository_owner }}/voiptests-${{ inputs.mm-type }}:ssut-${MM_BRANCH_SAFE}"
          IMAGE_REF="${IMAGE_BASE}-${SHA_SHORT}"
          CACHE_SPEC="type=registry,ref=${IMAGE_BASE}-buildcache"
          IMAGE_ARTIFACT="ssut-image-${{ inputs.mm-type }}-${MM_BRANCH_SAFE}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "image-artifact=${IMAGE_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "cache-spec=${CACHE_SPEC}" >> "$GITHUB_OUTPUT"

      - name: Restore BuildKit image cache
        if: ${{ inputs.buildkit-image-cache-key != '' && inputs.buildkit-image-cache-path != '' }}
        id: restore_buildkit_image_cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ inputs.buildkit-image-cache-path }}
          key: ${{ inputs.buildkit-image-cache-key }}

      - name: Load BuildKit image cache
        if: ${{ inputs.buildkit-image-cache-tar != '' && steps.restore_buildkit_image_cache.outputs.cache-hit == 'true' }}
        id: load_buildkit_image_cache
        shell: bash
        run: docker load --input "${{ inputs.buildkit-image-cache-tar }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=${{ inputs.buildkit-image }}

      - name: Login to GHCR
        if: ${{ !inputs.use-local-image }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SSUT image
        if: ${{ !inputs.use-local-image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./.github/docker/Dockerfile.ssut
          push: true
          tags: ${{ steps.meta.outputs.image-ref }}
          build-args: |
            BASE_IMAGE=${{ inputs.rtpp-image }}:${{ inputs.rtpp-image-tag }}
            MM_TYPE=${{ inputs.mm-type }}
            MM_BRANCH=${{ inputs.mm-branch }}
          cache-from: ${{ steps.meta.outputs.cache-spec }}
          cache-to: ${{ steps.meta.outputs.cache-spec }},mode=max

      - name: Build SSUT image tarball
        if: ${{ inputs.use-local-image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./.github/docker/Dockerfile.ssut
          outputs: type=docker,dest=/tmp/ssut-image.tar
          tags: ${{ steps.meta.outputs.image-ref }}
          build-args: |
            BASE_IMAGE=${{ inputs.rtpp-image }}:${{ inputs.rtpp-image-tag }}
            MM_TYPE=${{ inputs.mm-type }}
            MM_BRANCH=${{ inputs.mm-branch }}

      - name: Upload SSUT image artifact
        if: ${{ inputs.use-local-image }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.image-artifact }}
          path: /tmp/ssut-image.tar

  test_ghcr:
    name: Run Tests
    if: ${{ !inputs.use-local-image }}
    runs-on: ubuntu-latest
    needs: [build_ssut_image]
    container:
      image: ${{ needs.build_ssut_image.outputs.image-ref }}
      options: --privileged --sysctl net.ipv6.conf.all.disable_ipv6=0
    env:
      MM_TYPE: ${{ inputs.mm-type }}
      MM_BRANCH: ${{ inputs.mm-branch }}
      RTPP_BRANCH: DOCKER
      RTPPC_TYPE: ${{ matrix.rtppc-type }}
      MM_AUTH: ${{ matrix.mm-auth }}
      ARTIFACT_FILES: ${{ inputs.artifact-files }}
    strategy:
      fail-fast: false
      matrix:
        rtppc-type: ${{ fromJSON(inputs.rtppc-types) }}
        mm-auth: ${{ fromJSON(inputs.mm-auths) }}
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Define PYTHON_CMD
        run: echo "PYTHON_CMD=${pythonLocation}/bin/python" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          cd /opt/voiptests
          ${PYTHON_CMD} -m pip install --upgrade pip
          ${PYTHON_CMD} -m pip install -r requirements.txt
          if [ "${MM_TYPE}" = "b2bua" ]
          then
            ${PYTHON_CMD} -m pip install -U -r dist/b2bua/requirements.txt
          fi

      - name: Build artifact name
        id: artifact_name
        run: |
          ARTNAME="test-logs_${{ inputs.mm-type }}_${{ inputs.mm-branch }}_${{ matrix.rtppc-type }}"
          MM_AUTH_SAFE="$(echo "${{ matrix.mm-auth }}" | sed 's|/|.|g')"
          if [ -n "${MM_AUTH_SAFE}" ]
          then
            ARTNAME="${ARTNAME}_${MM_AUTH_SAFE}"
          fi
          if [ "${{ inputs.mm-type }}" = "b2bua" ]
          then
            ARTNAME="${ARTNAME}_${{ matrix.python-version }}"
          fi
          echo "artname=${ARTNAME}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        id: run_tests
        timeout-minutes: 3
        run: |
          cd /opt/voiptests
          rm -rf test.logs
          LOG_FILES="bob.log alice.log rtpproxy.log rtpproxy.rout.diff.txt"
          if [ -n "${ARTIFACT_FILES}" ]
          then
            LOG_FILES="${LOG_FILES} ${ARTIFACT_FILES}"
          fi

          TEST_RES="ok"
          RTPP_VERSION=debug sh -x ./test_run.sh || TEST_RES="fail"
          mkdir -p test.logs/debug
          for f in ${LOG_FILES}
          do
            mv ${f} test.logs/debug || true
          done
          test "${TEST_RES}" = "ok"

          RTPP_VERSION=production sh -x ./test_run.sh || TEST_RES="fail"
          mkdir -p test.logs/production
          for f in ${LOG_FILES}
          do
            mv ${f} test.logs/production || true
          done
          test "${TEST_RES}" = "ok"

      - name: Upload test logs
        if: always() && ( steps.run_tests.outcome == 'success' || steps.run_tests.outcome == 'failure' )
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact_name.outputs.artname }}
          path: /opt/voiptests/test.logs
        continue-on-error: true

  test_local:
    name: Run Tests
    if: ${{ inputs.use-local-image }}
    runs-on: ubuntu-latest
    needs: [build_ssut_image]
    strategy:
      fail-fast: false
      matrix:
        rtppc-type: ${{ fromJSON(inputs.rtppc-types) }}
        mm-auth: ${{ fromJSON(inputs.mm-auths) }}
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Download SSUT image artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build_ssut_image.outputs.image-artifact }}
          path: /tmp

      - name: Load SSUT image
        run: docker load --input /tmp/ssut-image.tar

      - name: Build artifact name
        id: artifact_name
        run: |
          ARTNAME="test-logs_${{ inputs.mm-type }}_${{ inputs.mm-branch }}_${{ matrix.rtppc-type }}"
          MM_AUTH_SAFE="$(echo "${{ matrix.mm-auth }}" | sed 's|/|.|g')"
          if [ -n "${MM_AUTH_SAFE}" ]
          then
            ARTNAME="${ARTNAME}_${MM_AUTH_SAFE}"
          fi
          if [ "${{ inputs.mm-type }}" = "b2bua" ]
          then
            ARTNAME="${ARTNAME}_${{ matrix.python-version }}"
          fi
          echo "artname=${ARTNAME}" >> "$GITHUB_OUTPUT"

      - name: Run tests in local image
        run: |
          PYTHON_VER="$(echo '${{ matrix.python-version }}' | sed 's|-dev$||')"
          CTR_NAME="voiptests-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ strategy.job-index }}"
          trap 'docker rm -f "${CTR_NAME}" >/dev/null 2>&1 || true' EXIT

          docker create \
            --name "${CTR_NAME}" \
            --privileged \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            -e MM_TYPE='${{ inputs.mm-type }}' \
            -e MM_BRANCH='${{ inputs.mm-branch }}' \
            -e MM_AUTH='${{ matrix.mm-auth }}' \
            -e RTPP_BRANCH='DOCKER' \
            -e RTPPC_TYPE='${{ matrix.rtppc-type }}' \
            -e ARTIFACT_FILES='${{ inputs.artifact-files }}' \
            -e PYTHON_CMD="python${PYTHON_VER}" \
            '${{ needs.build_ssut_image.outputs.image-ref }}' \
            /bin/sh -lc '
              set -e
              cd /opt/voiptests
              if ! command -v "${PYTHON_CMD}" >/dev/null 2>&1
              then
                PYTHON_CMD=python3
              fi
              export PYTHON_CMD
              export PIP_BREAK_SYSTEM_PACKAGES=1

              ${PYTHON_CMD} -m pip install --upgrade pip
              ${PYTHON_CMD} -m pip install -r requirements.txt
              if [ "${MM_TYPE}" = "b2bua" ]
              then
                ${PYTHON_CMD} -m pip install -U -r dist/b2bua/requirements.txt
              fi

              rm -rf test.logs
              LOG_FILES="bob.log alice.log rtpproxy.log rtpproxy.rout.diff.txt"
              if [ -n "${ARTIFACT_FILES}" ]
              then
                LOG_FILES="${LOG_FILES} ${ARTIFACT_FILES}"
              fi

              TEST_RES="ok"
              RTPP_VERSION=debug sh -x ./test_run.sh || TEST_RES="fail"
              mkdir -p test.logs/debug
              for f in ${LOG_FILES}
              do
                mv ${f} test.logs/debug || true
              done
              test "${TEST_RES}" = "ok"

              RTPP_VERSION=production sh -x ./test_run.sh || TEST_RES="fail"
              mkdir -p test.logs/production
              for f in ${LOG_FILES}
              do
                mv ${f} test.logs/production || true
              done
              test "${TEST_RES}" = "ok"
            '

          docker start -a "${CTR_NAME}"
          rm -rf test.logs
          docker cp "${CTR_NAME}:/opt/voiptests/test.logs" ./test.logs

      - name: Upload test logs
        if: always() && ( steps.run_tests.outcome == 'success' || steps.run_tests.outcome == 'failure' )
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact_name.outputs.artname }}
          path: test.logs
        continue-on-error: true
