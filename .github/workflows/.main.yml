name: Reusable Workflow

on:
  workflow_call:
    inputs:
      mm-type:
        required: true
        type: string
      mm-branch:
        required: false
        type: string
        default: 'master'
      mm-auths:
        required: false
        type: string
        default: '[""]'
      python-versions:
        required: false
        type: string
        default: '["3.x"]'
      rtppc-types:
        required: true
        type: string
      use-local-image:
        required: false
        type: boolean
        default: false
      rtpp-image:
        required: false
        type: string
        default: 'ghcr.io/sippy/rtpproxy'
      rtpp-image-tag:
        required: false
        type: string
        default: 'latest'
      artifact-files:
        required: false
        type: string
        default: ''
      buildkit-image:
        required: false
        type: string
        default: 'moby/buildkit:buildx-stable-1'
      buildkit-image-cache-key:
        required: false
        type: string
        default: ''
      buildkit-image-cache-path:
        required: false
        type: string
        default: ''
      buildkit-image-cache-tar:
        required: false
        type: string
        default: ''

jobs:
  build_ssut_image:
    name: Build SSUT Image
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    env:
      DOCKER_BUILD_SUMMARY: false
      DOCKER_BUILD_RECORD_UPLOAD: false
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image metadata
        id: meta
        run: |
          MM_HASH="$(MM_TYPE='${{ inputs.mm-type }}' MM_BRANCH='${{ inputs.mm-branch }}' ./install_depends/opensips.sh --get_mm_hash)"
          IMAGE_BASE="ghcr.io/${{ github.repository_owner }}/voiptests-${{ inputs.mm-type }}:ssut-${{ inputs.mm-branch }}-py${{ matrix.python-version }}"
          IMAGE_REF="${IMAGE_BASE}-${GITHUB_SHA}"
          CACHE_SPEC="type=registry,ref=${IMAGE_BASE}-${MM_HASH}-buildcache"
          IMAGE_ARTIFACT="ssut-image-${{ inputs.mm-type }}-${{ inputs.mm-branch }}-py${{ matrix.python-version }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "image-artifact=${IMAGE_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "cache-spec=${CACHE_SPEC}" >> "$GITHUB_OUTPUT"
          echo "mm-hash=${MM_HASH}" >> "$GITHUB_OUTPUT"
          echo "MM hash: ${MM_HASH}"

      - name: Restore BuildKit image cache
        if: ${{ inputs.buildkit-image-cache-key != '' && inputs.buildkit-image-cache-path != '' }}
        id: restore_buildkit_image_cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ inputs.buildkit-image-cache-path }}
          key: ${{ inputs.buildkit-image-cache-key }}

      - name: Load BuildKit image cache
        if: ${{ inputs.buildkit-image-cache-tar != '' && steps.restore_buildkit_image_cache.outputs.cache-hit == 'true' }}
        id: load_buildkit_image_cache
        shell: bash
        run: docker load --input "${{ inputs.buildkit-image-cache-tar }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=${{ inputs.buildkit-image }}

      - name: Login to GHCR
        if: ${{ !inputs.use-local-image }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SSUT image
        if: ${{ !inputs.use-local-image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./.github/docker/Dockerfile.ssut
          push: true
          tags: ${{ steps.meta.outputs.image-ref }}
          build-args: |
            BASE_IMAGE=${{ inputs.rtpp-image }}:${{ inputs.rtpp-image-tag }}
            MM_TYPE=${{ inputs.mm-type }}
            MM_BRANCH=${{ inputs.mm-branch }}
            MM_REV=${{ steps.meta.outputs.mm-hash }}
            PYTHON_VERSION=${{ matrix.python-version }}
          cache-from: ${{ steps.meta.outputs.cache-spec }}
          cache-to: ${{ steps.meta.outputs.cache-spec }},mode=max

      - name: Build SSUT image tarball
        if: ${{ inputs.use-local-image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./.github/docker/Dockerfile.ssut
          outputs: type=docker,dest=/tmp/ssut-image.tar
          tags: ${{ steps.meta.outputs.image-ref }}
          build-args: |
            BASE_IMAGE=${{ inputs.rtpp-image }}:${{ inputs.rtpp-image-tag }}
            MM_TYPE=${{ inputs.mm-type }}
            MM_BRANCH=${{ inputs.mm-branch }}
            MM_REV=${{ steps.meta.outputs.mm-hash }}
            PYTHON_VERSION=${{ matrix.python-version }}

      - name: Upload SSUT image artifact
        if: ${{ inputs.use-local-image }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.image-artifact }}
          path: /tmp/ssut-image.tar

  test_ghcr:
    name: Run Tests
    if: ${{ !inputs.use-local-image }}
    runs-on: ubuntu-latest
    needs: [build_ssut_image]
    container:
      image: ghcr.io/${{ github.repository_owner }}/voiptests-${{ inputs.mm-type }}:ssut-${{ inputs.mm-branch }}-py${{ matrix.python-version }}-${{ github.sha }}
      options: --privileged --sysctl net.ipv6.conf.all.disable_ipv6=0
    env:
      MM_TYPE: ${{ inputs.mm-type }}
      MM_BRANCH: ${{ inputs.mm-branch }}
      RTPP_BRANCH: DOCKER
      RTPPC_TYPE: ${{ matrix.rtppc-type }}
      MM_AUTH: ${{ matrix.mm-auth }}
      ARTIFACT_FILES: ${{ inputs.artifact-files }}
    strategy:
      fail-fast: false
      matrix:
        rtppc-type: ${{ fromJSON(inputs.rtppc-types) }}
        mm-auth: ${{ fromJSON(inputs.mm-auths) }}
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Build artifact name
        id: artifact_name
        run: |
          ARTNAME="test-logs_${{ inputs.mm-type }}_${{ inputs.mm-branch }}_${{ matrix.rtppc-type }}"
          MM_AUTH_SAFE="$(echo "${{ matrix.mm-auth }}" | sed 's|/|.|g')"
          if [ -n "${MM_AUTH_SAFE}" ]
          then
            ARTNAME="${ARTNAME}_${MM_AUTH_SAFE}"
          fi
          if [ "${{ inputs.mm-type }}" = "b2bua" ]
          then
            ARTNAME="${ARTNAME}_${{ matrix.python-version }}"
          fi
          echo "artname=${ARTNAME}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        id: run_tests
        timeout-minutes: 4
        run: voiptests-run-ssut-tests

      - name: Upload test logs
        if: always() && ( steps.run_tests.outcome == 'success' || steps.run_tests.outcome == 'failure' )
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact_name.outputs.artname }}
          path: /opt/voiptests/test.logs
        continue-on-error: true

  test_local:
    name: Run Tests
    if: ${{ inputs.use-local-image }}
    runs-on: ubuntu-latest
    needs: [build_ssut_image]
    strategy:
      fail-fast: false
      matrix:
        rtppc-type: ${{ fromJSON(inputs.rtppc-types) }}
        mm-auth: ${{ fromJSON(inputs.mm-auths) }}
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Download SSUT image artifact
        uses: actions/download-artifact@v8
        with:
          name: ssut-image-${{ inputs.mm-type }}-${{ inputs.mm-branch }}-py${{ matrix.python-version }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp

      - name: Load SSUT image
        run: docker load --input /tmp/ssut-image.tar

      - name: Build artifact name
        id: artifact_name
        run: |
          ARTNAME="test-logs_${{ inputs.mm-type }}_${{ inputs.mm-branch }}_${{ matrix.rtppc-type }}"
          MM_AUTH_SAFE="$(echo "${{ matrix.mm-auth }}" | sed 's|/|.|g')"
          if [ -n "${MM_AUTH_SAFE}" ]
          then
            ARTNAME="${ARTNAME}_${MM_AUTH_SAFE}"
          fi
          if [ "${{ inputs.mm-type }}" = "b2bua" ]
          then
            ARTNAME="${ARTNAME}_${{ matrix.python-version }}"
          fi
          echo "artname=${ARTNAME}" >> "$GITHUB_OUTPUT"

      - name: Run tests in local image
        id: run_tests
        run: |
          CTR_NAME="voiptests-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ strategy.job-index }}"
          trap 'docker rm -f "${CTR_NAME}" >/dev/null 2>&1 || true' EXIT

          docker create \
            --name "${CTR_NAME}" \
            --privileged \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            -e MM_TYPE='${{ inputs.mm-type }}' \
            -e MM_BRANCH='${{ inputs.mm-branch }}' \
            -e MM_AUTH='${{ matrix.mm-auth }}' \
            -e RTPP_BRANCH='DOCKER' \
            -e RTPPC_TYPE='${{ matrix.rtppc-type }}' \
            -e ARTIFACT_FILES='${{ inputs.artifact-files }}' \
            'ghcr.io/${{ github.repository_owner }}/voiptests-${{ inputs.mm-type }}:ssut-${{ inputs.mm-branch }}-py${{ matrix.python-version }}-${{ github.sha }}' \
            voiptests-run-ssut-tests

          set +e
          docker start -a "${CTR_NAME}"
          TEST_STATUS="$?"
          set -e
          rm -rf test.logs
          docker cp "${CTR_NAME}:/opt/voiptests/test.logs" ./test.logs || true
          exit "${TEST_STATUS}"

      - name: Upload test logs
        if: always() && ( steps.run_tests.outcome == 'success' || steps.run_tests.outcome == 'failure' )
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact_name.outputs.artname }}
          path: test.logs
        continue-on-error: true
